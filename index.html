<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BartenderSchool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // Light Mode: White, Orange, Red
              brand: {
                light: '#ffffff',
                orange: '#f97316', // orange-500
                red: '#ef4444',    // red-500
              },
              // Dark Mode: Black, Blue, Azure
              night: {
                dark: '#000000',
                blue: '#1e40af',   // blue-800
                azure: '#38bdf8',  // sky-400
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        transition: background-color 0.3s, color 0.3s;
      }
    </style>
